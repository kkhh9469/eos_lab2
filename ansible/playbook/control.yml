---
- name: access_nodes
  hosts: access
  gather_facts: false

  tasks:
  - name: create vlan
    arista.eos.eos_config:
      parents: vlan {{ item.vlan }}
      lines:
        - name {{ item.vlan_name }}
    loop: "{{ access_interfaces }}"

  - name: attatch vlan to interface
    arista.eos.eos_config:
      parents: interface {{ item.name }} 
      lines:
        - switchport mode access
        - switchport access vlan {{ item.vlan }}
    loop: "{{ access_interfaces }}"

  - name: config trunk interfaces
    arista.eos.eos_config:
      parents: interface {{ item.name }}
      lines:
        - switchport mode trunk
        - switchport trunk allowed vlan {{ item.vlan | join(',') }}
    loop: "{{ trunk_interfaces }}"

- name: core_nodes
  hosts: core
  gather_facts: false

  tasks:
    - name: enable routing
      arista.eos.eos_config:
        lines:
          - ip routing

    - name: create vlan
      arista.eos.eos_config:
        parents: vlan {{ item.vlan }}
        lines:
          - name {{ item.vlan_name }}
      loop: "{{ vlans }}"

    - name: config trunk interfaces
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - switchport mode trunk
          - switchport trunk allowed vlan {{ item.vlans | join(',') }}
      loop: "{{ trunk_interfaces }}"

    - name: config ipv4 in vlan interfaces
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - ip address {{ item.ipv4 }}
      loop: "{{ vlan_interfaces }}"
      
    - name: config internet interface
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - no switchport
          - ip address {{ item.ipv4 }}
          - no shutdown
      loop: "{{ internet_interface }}"


- name: internet_nodes
  hosts: internet
  gather_facts: false

  tasks:
    - name: config interface
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - no switchport
          - ip address {{ item.ipv4 }}
          - no shutdown
      loop: "{{ internet_interface }}"

    - name: config internet routing
      arista.eos.eos_config:
        lines:
          - ip route {{ item.network }} {{ item.next_hop }}
      loop: "{{ routing_network }}"

- name: core/access nodes
  hosts: core, access
  gather_facts: false

  tasks:
    - name: enable api
      arista.eos.eos_config:
        parents: management api http-commands
        lines:
          - no shutdown
          - protocol http
