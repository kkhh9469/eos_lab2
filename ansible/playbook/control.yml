- name: core_nodes
  hosts: core
  gather_facts: false

  tasks:
    - name: create vlan
      arista.eos.eos_config:
        parents: vlan {{ item.vlan }}
        lines:
          - name {{ item.vlan_name }}
      loop: "{{ vlans }}"

    - name: config interfaces trunk mode
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - switchport mode trunk
      loop: "{{ trunk_interfaces }}"

    - name: create vlan interfaces
      arista.eos.eos_config:
        lines:
          - interface {{ item.name }}
      loop: "{{ vlan_interfaces }}"

    - name: config ipv4 in vlan interfaces
      arista.eos.eos_config:
        parents: interface {{ item.name }}
        lines:
          - ip address {{ item.ipv4 }}
      loop: "{{ vlan_interfaces }}"

    - name: enable routing
      arista.eos.eos_config:
        lines:
          - ip routing
