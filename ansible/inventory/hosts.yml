arista_nodes:
  children:
    internet:
      hosts:
        internet1:
          ansible_host: 172.20.20.101
    core:
      hosts:
        core1:
          ansible_host: 172.20.20.102
    access:
      hosts:
        access1:
          ansible_host: 172.20.20.103
        access2:
