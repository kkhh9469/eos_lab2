name: arista-lab2

topology:
  nodes:
    internet:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.101

    core:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.102

    access1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.103

    access2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.104

    access3:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.105

    server:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.130.11/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.130.1/24 dev eth1

    pc1:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.110.11/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.110.1/24 dev eth1

    pc2:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.110.12/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.110.1/24 dev eth1

    pc3:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.110.13/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.110.1/24 dev eth1

    ap1:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.120.11/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.120.1/24 dev eth1

    ap2:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.120.12/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.120.1/24 dev eth1

    ap3:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.120.13/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.120.1/24 dev eth1

  links:
    - endpoints: ['internet:eth1', 'core:eth4']
    - endpoints: ['core:eth1', 'access1:eth1']
    - endpoints: ['core:eth2', 'access2:eth1']
    - endpoints: ['core:eth3', 'access3:eth1']
    - endpoints: ['access1:eth2', 'pc1:eth1']
    - endpoints: ['access1:eth3', 'ap1:eth1']
    - endpoints: ['access2:eth2', 'pc2:eth1']
    - endpoints: ['access2:eth3', 'ap2:eth1']
    - endpoints: ['access3:eth2', 'pc3:eth1']
    - endpoints: ['access3:eth3', 'ap3:eth1']
    - endpoints: ['access3:eth4', 'server:eth1']
