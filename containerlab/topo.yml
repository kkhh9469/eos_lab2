name: arista-lab2

topology:
  nodes:
    spine1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.101

    spine2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.102

    leaf1:
      kind: arista_ceos
      image: ceos:4.36.0F
