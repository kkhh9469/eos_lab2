name: arista-lab2

topology:
  nodes:
    spine1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.101

    spine2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.102

    leaf1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.103

    leaf2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.104

    leaf3:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.105

    client1:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.11/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

    client2:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.12/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

    client3:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.13/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

    client11:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.111/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

    client12:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.112/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

    client13:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.100.113/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.100.1/24 dev eth1

  links:
    - endpoints: ['spine1:eth1', 'leaf1:eth1']
    - endpoints: ['spine1:eth2', 'leaf2:eth1']
    - endpoints: ['spine1:eth3', 'leaf3:eth1']
    - endpoints: ['spine2:eth1', 'leaf1:eth2']
    - endpoints: ['spine2:eth2', 'leaf2:eth2']
    - endpoints: ['spine2:eth3', 'leaf3:eth2']
    - endpoints: ['leaf1:eth10', 'client1:eth1']
    - endpoints: ['leaf1:eth11', 'client11:eth1']
    - endpoints: ['leaf2:eth10', 'client2:eth1']
    - endpoints: ['leaf2:eth11', 'client12:eth1']
    - endpoints: ['leaf3:eth10', 'client3:eth1']
    - endpoints: ['leaf3:eth11', 'client13:eth1']
